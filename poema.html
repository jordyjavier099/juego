<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fff0f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif; /* Consistencia con index.html */
            flex-direction: column;
            overflow: hidden;
        }

        .contenedor-poema {
            background: white;
            padding: 40px;
            border-radius: 30px; /* Bordes más redondeados y modernos */
            box-shadow: 0 15px 35px rgba(251, 111, 146, 0.2);
            max-width: 400px;
            text-align: center;
            border: 2px solid #ffb3c1;
            margin-bottom: 30px;
            animation: aparecer 1.5s ease-out; /* Animación de entrada suave */
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            color: #ff4d6d; 
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        p { 
            color: #590d22; 
            font-style: italic; 
            line-height: 1.8; 
            font-size: 1.2rem; 
            margin: 15px 0;
        }
        
        .corazon-final {
            font-size: 1.5rem;
            margin-top: 20px;
            display: block;
        }

        /* Estilo del botón de retroceder mejorado */
        .btn-regresar {
            padding: 12px 25px;
            background-color: #fb6f92;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-regresar:hover {
            background-color: #ff8fab;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(251, 111, 146, 0.4);
        }
    </style>
</head>
<body>

    <div class="contenedor-poema">
        <h2>Mi Poema para Ti</h2>
        <p>
            "En el jardín de mi vida,<br>
            la flor más bella eres tú,<br>
            con tu sonrisa encendida<br>
            y tu mirada llena de luz.<br><br>
            No hay camino que no andaría,<br>
            ni sueño que no soñaría,<br>
            si al final de cada día,<br>
            tú fueras mi alegría."
        </p>
        <span class="corazon-final">❤️ Te amo ❤️</span>
    </div>

    <button class="btn-regresar" onclick="window.location.href='index.html'">
        <span>⬅</span> Volver al inicio
    </button>

</body>
</html>
