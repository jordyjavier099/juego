<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi mujercita hermosa ❤️</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor-foto">
        <img src="foto.jpg" alt="Nosotros" class="foto-principal">
    </div>

    <h1 id="titulo">¿Quieres ser mi futura esposa? ❤️</h1>
    
    <div class="botones">
        <button id="btnSi">¡SÍ!</button>
        <button id="btnNo">No</button>
    </div>

    <script>
        const btnSi = document.getElementById('btnSi');
        const btnNo = document.getElementById('btnNo');
        const titulo = document.getElementById('titulo');
        let escalaNo = 1;

        // Crear corazones de fondo
        function crearCorazones() {
            for(let i=0; i<20; i++) {
                const corazon = document.createElement('div');
                corazon.className = 'corazon-bg';
                corazon.innerHTML = '❤️';
                corazon.style.left = Math.random() * 100 + 'vw';
                corazon.style.animationDuration = (Math.random() * 3 + 2) + 's';
                corazon.style.opacity = Math.random();
                document.body.appendChild(corazon);
            }
        }
        crearCorazones();

        function huirYAchicar() {
            // Bajamos la escala gradualmente
            escalaNo *= 0.90; 
            if (escalaNo < 0.4) escalaNo = 0.4;

            // Margen de seguridad para que no toque los bordes exactos
            const margen = 100;
            const x = Math.random() * (window.innerWidth - (margen * 2)) + margen;
            const y = Math.random() * (window.innerHeight - (margen * 2)) + margen;

            btnNo.style.position = "fixed";
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
            btnNo.style.transform = `translate(-50%, -50%) scale(${escalaNo})`;
        }

        btnNo.addEventListener('mouseenter', huirYAchicar);
        btnNo.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            huirYAchicar(); 
        });

        btnSi.addEventListener('click', () => {
            // Desaparecer botones
            btnSi.style.transform = "translate(-50%, -50%) scale(0)";
            btnSi.style.opacity = "0";
            
            // CORRECCIÓN: Se eliminó el "style" extra que sobraba
            btnNo.style.display = "none"; 
            
            titulo.innerHTML = "¡SABÍA QUE DIRÍAS QUE SÍ! ❤️";

            // Animación de cupidos
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const cupido = document.createElement('div');
                    cupido.classList.add('cupido');
                    cupido.innerHTML = '👼';
                    cupido.style.left = "50%";
                    cupido.style.top = "50%";
                    cupido.style.setProperty('--dx', (Math.random() * 1000 - 500) + 'px');
                    cupido.style.setProperty('--dy', (Math.random() * 1000 - 500) + 'px');
                    document.body.appendChild(cupido);
                    setTimeout(() => cupido.remove(), 3000);
                }, i * 100);
            }

            // Redirección al poema
            setTimeout(() => {
                window.location.href = "poema.html";
            }, 3500);
        });
    </script>
</body>
</html>
